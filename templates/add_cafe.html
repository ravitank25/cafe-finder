<!doctype html>
<html lang="en">
  <head>
    <title>Add Cafe</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-5">
      <div class="card shadow p-4">
        <h2 class="mb-4">Add New Cafe</h2>

        <form method="POST" enctype="multipart/form-data">
          {% csrf_token %}

          <input
            class="form-control mb-3"
            type="text"
            name="name"
            placeholder="Cafe Name"
          />

          <input
            class="form-control mb-3"
            type="text"
            name="city"
            placeholder="City"
          />

          <textarea
            class="form-control mb-3"
            name="address"
            placeholder="Address"
          ></textarea>

          <textarea
            class="form-control mb-3"
            name="description"
            placeholder="Description"
          ></textarea>

          <input class="form-control mb-3" type="file" name="image" />

          <input
            class="form-control mb-3"
            type="text"
            name="coffee_price"
            placeholder="₹150"
          />

          <input
            class="form-control mb-3"
            type="number"
            step="0.1"
            min="0"
            max="5"
            name="rating"
            placeholder="Rating"
          />

          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="wifi" />
            <label class="form-check-label">WiFi</label>
          </div>

          <div class="form-check">
            <input
              class="form-check-input"
              type="checkbox"
              name="power_socket"
            />
            <label class="form-check-label">Power Socket</label>
          </div>

          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="parking" />
            <label class="form-check-label">Parking</label>
          </div>

          <button class="btn btn-primary mt-3">Save Cafe</button>
        </form>
      </div>
    </div>
  </body>
</html>
